            font-family: 'Work Sans', sans-serif;
        }

        .btn-primary {
            background: var(--verde-bosque);
            color: var(--blanco);
            box-shadow: 0 4px 16px rgba(45, 80, 22, 0.3);

        .btn-primary:active {

        .success-message {

        .counter {

            animation: fadeIn 0.6s ease 0.4s both;

        @keyframes fadeInDown {

                transform: translateY(-20px);
            }

                opacity: 1;

            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }

        .loading {
            pointer-events: none;

        }

        .spinner {
            display: inline-block;
            width: 16px;

<body>
    <div class="container">
        <div class="header">
            <div class="logo">AMANÁ</div>
            <div class="subtitle">Registro Ferias</div>
        </div>

        <div class="form-card">
            <form id="ventaForm">
                <div class="form-group">
                    <label for="sku">Pieza</label>
                    <select id="sku" required="">
                        <option value="">Seleccionar...</option>
                        <option value="AMA-001">Gargantilla Espera - $1,500,000</option>
                        <option value="AMA-002">Cadena Espera - $220,000</option>
                        <option value="AMA-003">Topos Espera - $250,000</option>
                        <option value="AMA-004">Anillo Alacrán - $450,000</option>
                        <option value="AMA-005">Anillo Doble - $450,000</option>
                        <option value="AMA-006">Anillo Trenzado - $480,000</option>
                        <option value="AMA-007">Earcuff Espera - $350,000</option>
                        <option value="AMA-008">Brazalete Espera - $920,000</option>
                        <option value="AMA-009">Candongas Espera - $620,000</option>
                        <option value="AMA-010">Aretes Esperanza - $350,000</option>
                        <option value="AMA-011">Earcuff Esperanza - $320,000</option>
                        <option value="AMA-012">Anillo Esperanza - $350,000</option>
                        <option value="AMA-013">Collar Esperanza - $2,100,000</option>
                        <option value="AMA-014">Brazalete Esperanza - $980,000</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cantidad">Cantidad</label>
                    <input type="number" id="cantidad" min="1" value="1" required="">
                </div>

                <div class="form-group">
                    <label for="cliente">Cliente (opcional)</label>
                    <input type="text" id="cliente" placeholder="Nombre o email">
                </div>

                <div class="form-group">
                    <label for="medio">Medio de Pago</label>
                    <select id="medio" required="">
                        <option value="">Seleccionar...</option>
                        <option value="Efectivo">Efectivo</option>
                        <option value="Tarjeta">Tarjeta</option>
                        <option value="Bold">Bold</option>
                        <option value="Transferencia">Transferencia</option>
                    </select>
                </div>

                <div class="btn-container">
                    <button type="button" class="btn btn-secondary" onclick="limpiarForm()">Limpiar</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Registrar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="counter" id="counter">Hoy: 0 ventas</div>

    <div class="success-message" id="successMessage">
        <div class="success-icon">✓</div>
        <div>Venta registrada</div>
    </div>

    <script>
        let ventasHoy = 0;
        
        // IMPORTANTE: Reemplaza esta URL con tu Google Apps Script Web App URL
        const SCRIPT_URL = https://script.google.com/macros/s/AKfycbxfYri8U2giB_PxmWss7MSI24rp7ZVMpbH9MVQDkyohBW1DE10yW-b68e5S_shR_I9T/exec;

        const productos = {
            'AMA-001': { nombre: 'Gargantilla Espera', precio: 1500000, costo: 610000 },
            'AMA-002': { nombre: 'Cadena Espera', precio: 220000, costo: 45500 },
            'AMA-003': { nombre: 'Topos Espera', precio: 250000, costo: 32702 },
            'AMA-004': { nombre: 'Anillo Alacrán', precio: 450000, costo: 137705 },
            'AMA-005': { nombre: 'Anillo Doble', precio: 450000, costo: 189000 },
            'AMA-006': { nombre: 'Anillo Trenzado', precio: 480000, costo: 141507 },
            'AMA-007': { nombre: 'Earcuff Espera', precio: 350000, costo: 185200 },
            'AMA-008': { nombre: 'Brazalete Espera', precio: 920000, costo: 440950 },
            'AMA-009': { nombre: 'Candongas Espera', precio: 620000, costo: 221950 },
            'AMA-010': { nombre: 'Aretes Esperanza', precio: 350000, costo: 138800 },
            'AMA-011': { nombre: 'Earcuff Esperanza', precio: 320000, costo: 126200 },
            'AMA-012': { nombre: 'Anillo Esperanza', precio: 350000, costo: 133400 },
            'AMA-013': { nombre: 'Collar Esperanza', precio: 2100000, costo: 785400 },
            'AMA-014': { nombre: 'Brazalete Esperanza', precio: 980000, costo: 369200 }
        };

        document.getElementById('ventaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.classList.add('loading');
            submitBtn.innerHTML = 'Guardando<span class="spinner"></span>';

            const sku = document.getElementById('sku').value;
            const cantidad = parseInt(document.getElementById('cantidad').value);
            const cliente = document.getElementById('cliente').value || 'Cliente feria';
            const medio = document.getElementById('medio').value;
            
            const producto = productos[sku];
            const fecha = new Date().toISOString().split('T')[0];
            const idVenta = 'F' + Date.now();

            const venta = {
                fecha: fecha,
                idVenta: idVenta,
                sku: sku,
                nombrePieza: producto.nombre,
                cliente: cliente,
                cantidad: cantidad,
                precioVenta: producto.precio,
                canal: 'Feria',
                medioPago: medio,
                comision: medio === 'Efectivo' ? 'No' : 'Sí',
                comisionCOP: medio === 'Efectivo' ? 0 : Math.round(producto.precio * cantidad * 0.047),
                costoUnitario: producto.costo,
                costoTotal: producto.costo * cantidad,
                ingresoTotal: producto.precio * cantidad,
                margenTotal: (producto.precio - producto.costo) * cantidad
            };

            try {
                // Guardar en Google Sheets
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(venta)
                });

                mostrarExito();
                ventasHoy++;
                actualizarContador();
                limpiarForm();
            } catch (error) {
                alert('Error al guardar. Revisa tu conexión.');
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.innerHTML = 'Registrar';
            }
        });

        function limpiarForm() {
            document.getElementById('ventaForm').reset();
            document.getElementById('cantidad').value = 1;
        }

        function mostrarExito() {
            const msg = document.getElementById('successMessage');
            msg.classList.add('show');
            setTimeout(() => {
                msg.classList.remove('show');
            }, 1500);
        }

        function actualizarContador() {
            document.getElementById('counter').textContent = `Hoy: ${ventasHoy} ventas`;
        }

        // Cargar contador del día
        const hoy = new Date().toLocaleDateString();
        const ventasGuardadas = localStorage.getItem('ventasHoy');
        const fechaGuardada = localStorage.getItem('fechaVentas');
        
        if (fechaGuardada === hoy && ventasGuardadas) {
            ventasHoy = parseInt(ventasGuardadas);
            actualizarContador();
        } else {
            localStorage.setItem('fechaVentas', hoy);
            localStorage.setItem('ventasHoy', '0');
        }

        window.addEventListener('beforeunload', () => {
            localStorage.setItem('ventasHoy', ventasHoy.toString());
        });
    </script>

</body></html>
